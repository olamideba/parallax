services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parallax-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parallax-worker
    command: >
      uv run celery -A src.entrypoints.workers.celery_app worker
      --loglevel=info
      --concurrency=4
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    container_name: parallax-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parallax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parallax}
      POSTGRES_DB: ${POSTGRES_DB:-parallax}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parallax} -d ${POSTGRES_DB:-parallax}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parallax-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
